# AI reviewer (spec step 5). Reviews every PR against the checklist and the
# repo's own docs. Findings are posted as a PR review; the agent workflow then
# picks them up (auto-fix loop, spec step 6).

name: Claude Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]

jobs:
  review:
    # Don't review draft PRs or Dependabot bumps
    if: ${{ !github.event.pull_request.draft && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review PR
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} against
            docs/coding_standards.md and docs/architecture.md. Check, in order of severity:

            1. Security — injection, secrets in code, unvalidated input, unsafe deps
            2. Correctness — does the change satisfy the linked issue's acceptance criteria?
            3. Test coverage — is every new behavior tested? Any weakened/deleted tests?
            4. Architecture compliance — does it respect the layering in docs/architecture.md?
            5. Performance — obvious N+1s, unbounded loops, blocking I/O in hot paths
            6. Maintainability — naming, duplication, dead code

            Post your findings as review comments on the PR using `gh pr review`
            and inline comments. Each finding must state the file/line, the problem,
            and a concrete fix. If everything passes, approve with a short summary.
            Address only real issues — do not pad the review.
          claude_args: |
            --allowedTools "Read,Grep,Glob,Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr review:*),Bash(gh pr comment:*),mcp__github_inline_comment__create_inline_comment"
